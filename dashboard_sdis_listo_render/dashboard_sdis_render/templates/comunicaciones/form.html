{% extends 'base.html' %}{% block content %}<style>.box{background:#fff;padding:22px;border-radius:16px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}.full{grid-column:1/-1}label{font-weight:600;display:block;margin-bottom:5px}input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:9px;box-sizing:border-box}.btn{padding:11px 16px;border:0;border-radius:9px;color:#fff;background:#5b67d8}</style>
<h2>📝 Nueva comunicación</h2><form method="post" enctype="multipart/form-data" class="box"><div class="grid"><div><label>Tipo *</label><select name="tipo" required>{% for t in tipos %}<option>{{t}}</option>{% endfor %}</select></div><div><label>Prioridad</label><select name="prioridad">{% for p in prioridades %}<option>{{p}}</option>{% endfor %}</select></div><div class="full"><label>Asunto *</label><input name="asunto" required></div><div class="full"><label>Descripción / contenido *</label><textarea name="descripcion" rows="6" required></textarea></div><div><label>Destinatarios</label><select name="destinatarios" multiple size="6">{% for u in usuarios %}<option value="{{u.id}}">{{u.nombre_completo}}</option>{% endfor %}</select></div><div><label>Responsable</label><select name="responsable_id"><option value="">Sin asignar</option>{% for u in usuarios %}<option value="{{u.id}}">{{u.nombre_completo}}</option>{% endfor %}</select></div><div><label>Remitente externo</label><input name="remitente_externo"></div><div><label>Radicado externo</label><input name="radicado_externo"></div><div><label>Medio</label><select name="medio"><option>Sistema</option><option>Correo electrónico</option><option>Ventanilla</option><option>Físico</option></select></div><div><label>Número de folios</label><input type="number" min="0" name="numero_folios"></div><div><label>Fecha límite</label><input type="date" name="fecha_limite"></div><div><label>Adjunto</label><input type="file" name="archivo"></div><div class="full"><label><input style="width:auto" type="checkbox" name="requiere_respuesta"> Requiere respuesta</label><label><input style="width:auto" type="checkbox" name="confidencial"> Información confidencial</label></div><div class="full"><label>Observaciones</label><textarea name="observaciones"></textarea></div></div><br><button class="btn" name="accion" value="borrador">Guardar borrador</button> <button class="btn" name="accion" value="radicar">Guardar y radicar</button></form>{% endblock %}
