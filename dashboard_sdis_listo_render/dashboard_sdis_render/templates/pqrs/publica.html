<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Radicar PQRS</title><link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}"><style>body{background:#eef3f8;font-family:Inter,Arial}.wrap{max-width:900px;margin:35px auto;background:white;padding:30px;border-radius:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.full{grid-column:1/-1}label{font-weight:700;display:block;margin-bottom:6px}input,select,textarea{width:100%;padding:12px;border:1px solid #ccd5df;border-radius:10px;box-sizing:border-box}.btn{background:#5b2d90;color:white;border:0;padding:13px 22px;border-radius:10px;font-weight:700;text-decoration:none}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.alert{padding:12px;border-left:4px solid #f39c12;background:#fff7e6;margin:15px 0}@media(max-width:700px){.grid{grid-template-columns:1fr}.full{grid-column:auto}}</style></head><body><div class="wrap"><div class="top"><div><h1>📩 Radicar PQRS</h1><p>Registra una petición, queja, reclamo, sugerencia, denuncia o felicitación.</p></div><a class="btn" href="{{ url_for('consultar_pqrs_publica') }}">Consultar estado</a></div>{% with m=get_flashed_messages(with_categories=true) %}{% for c,x in m %}<div class="alert">{{x}}</div>{% endfor %}{% endwith %}<form method="post" enctype="multipart/form-data" class="grid"><div><label>Tipo *</label><select name="tipo" required><option value="">Selecciona</option>{% for t in tipos %}<option>{{t}}</option>{% endfor %}</select></div><div><label><input type="checkbox" name="anonima" value="1" style="width:auto"> Solicitud anónima</label></div><div><label>Nombre completo</label><input name="nombre_solicitante"></div><div><label>Documento</label><input name="documento"></div><div><label>Correo</label><input type="email" name="correo"></div><div><label>Teléfono</label><input name="telefono"></div><div class="full"><label>Asunto *</label><input name="asunto" required maxlength="200"></div><div class="full"><label>Descripción *</label><textarea name="descripcion" rows="8" required></textarea></div><div class="full"><label>Adjunto</label><input type="file" name="archivo" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx"></div><div class="full"><label><input type="checkbox" name="autorizacion_datos" value="1" required style="width:auto"> Autorizo el tratamiento de mis datos personales *</label></div><div class="full"><button class="btn">Radicar PQRS</button></div></form></div></body></html>
