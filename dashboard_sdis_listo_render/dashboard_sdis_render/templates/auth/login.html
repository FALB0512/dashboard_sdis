<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Iniciar sesión | NubiDoc</title><link rel="icon" href="{{ url_for('static',filename='favicon.ico') }}"><link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}"><style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eef2ff,#f8fafc);font-family:Inter,Arial}.login-card{width:min(430px,90vw);background:#fff;padding:36px;border-radius:24px;box-shadow:0 24px 70px rgba(15,23,42,.18)}.login-card img{display:block;width:150px;margin:0 auto 15px}.login-card h1{text-align:center;margin:0}.login-card p{text-align:center;color:#64748b}.field{margin:18px 0}.field label{display:block;font-weight:700;margin-bottom:7px}.field input{width:100%;box-sizing:border-box;padding:13px 14px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px}.btn-login{width:100%;padding:14px;border:0;border-radius:11px;background:#5b21b6;color:white;font-weight:800;font-size:16px;cursor:pointer}.alert{padding:12px;border-radius:10px;margin:10px 0;background:#fee2e2;color:#991b1b}.hint{font-size:12px;color:#64748b;margin-top:18px;text-align:center}
</style></head><body><section class="login-card"><img src="{{ url_for('static',filename='img/logo2.png') }}"><h1>Bienvenido</h1><p>Ingresa a la plataforma de gestión</p>{% with msgs=get_flashed_messages(with_categories=true) %}{% for cat,msg in msgs %}<div class="alert">{{ msg }}</div>{% endfor %}{% endwith %}<form method="post"><div class="field"><label>Usuario</label><input name="username" autocomplete="username" required autofocus></div><div class="field"><label>Contraseña</label><input type="password" name="password" autocomplete="current-password" required></div><button class="btn-login">Iniciar sesión</button></form><div class="hint">Primer acceso: superadmin / Cambiar123!</div></section></body></html>
