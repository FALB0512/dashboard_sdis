{% extends 'base.html' %}{% block content %}<div class="form-container"><h2>🔐 Cambiar contraseña</h2><p>Por seguridad debes definir una contraseña personal antes de continuar.</p><form method="post"><div class="form-group"><label>Contraseña actual</label><input type="password" name="actual" required></div><div class="form-group"><label>Nueva contraseña</label><input type="password" name="nueva" minlength="8" required><small>Mínimo 8 caracteres, una mayúscula y un número.</small></div><div class="form-group"><label>Confirmar nueva contraseña</label><input type="password" name="confirmar" minlength="8" required></div><button class="btn btn-primary">Actualizar contraseña</button></form></div>{% endblock %}
