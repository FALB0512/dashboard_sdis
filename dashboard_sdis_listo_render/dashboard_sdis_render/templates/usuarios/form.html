{% extends 'base.html' %}{% block content %}<div class="form-container"><h2>{{ 'Editar usuario' if usuario else 'Crear usuario' }}</h2><form method="post"><div class="form-grid"><div class="form-group"><label>Nombre completo *</label><input name="nombre_completo" value="{{ usuario.nombre_completo if usuario else '' }}" required></div><div class="form-group"><label>Nombre de usuario *</label><input name="username" value="{{ usuario.username if usuario else '' }}" {{ 'readonly' if usuario else '' }} required></div><div class="form-group"><label>Correo electrónico</label><input type="email" name="email" value="{{ usuario.email if usuario and usuario.email else '' }}"></div><div class="form-group"><label>Rol *</label><select name="rol" required>{% for r in roles %}<option value="{{ r }}" {{ 'selected' if usuario and usuario.rol==r else '' }}>{{ ROLE_LABELS[r] }}</option>{% endfor %}</select></div><div class="form-group"><label>{{ 'Nueva contraseña (opcional)' if usuario else 'Contraseña temporal *' }}</label><input type="password" name="password" minlength="8" {{ '' if usuario else 'required' }}></div>{% if usuario %}<div class="form-group"><label>Estado</label><select name="activo"><option value="1" {{ 'selected' if usuario.activo else '' }}>Activo</option><option value="0" {{ 'selected' if not usuario.activo else '' }}>Inactivo</option></select></div>{% endif %}</div><div class="form-actions"><button class="btn btn-primary">Guardar</button><a class="btn" href="{{ url_for('usuarios') }}">Cancelar</a></div></form></div>{% endblock %}
