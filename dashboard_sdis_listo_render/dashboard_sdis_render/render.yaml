services:
  - type: web
    name: dashboard-sdis-comunicaciones
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_MINUTES
        value: "60"
      - key: INITIAL_ADMIN_USER
        value: superadmin
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
